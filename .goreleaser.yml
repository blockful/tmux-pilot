version: 2

project_name: tmux-pilot

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd
    binary: tmux-pilot
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

brews:
  - repository:
      owner: blockful
      name: homebrew-tmux-pilot
    commit_author:
      name: goreleaser
      email: goreleaser@blockful.io
    homepage: "https://github.com/blockful/tmux-pilot"
    description: "A minimal TUI for managing tmux sessions"
    license: "MIT"
    install: |
      bin.install "tmux-pilot"
    test: |
      assert_match "tmux-pilot", shell_output("#{bin}/tmux-pilot --version")

release:
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
